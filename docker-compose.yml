services:
  postgres:
    image: postgres:16-alpine
    container_name: employeehub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-employeehub}
      POSTGRES_USER: ${POSTGRES_USER:-employeehub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-employeehub}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - employeehub-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  employeehub-postgres-data:
